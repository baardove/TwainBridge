name: TwainBridge
options:
  bundleIdPrefix: com.45webs
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: true
    SWIFT_STRICT_CONCURRENCY: complete
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: false
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "0"
targets:
  TwainBridge:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
      - sdk: ImageCaptureCore.framework
      - sdk: Network.framework
      - sdk: Security.framework
      - sdk: ServiceManagement.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.45webs.TwainBridge
        PRODUCT_NAME: TwainBridge
        DEVELOPMENT_TEAM: FGA3Z9LLS2
        CODE_SIGN_ENTITLEMENTS: Config/TwainBridge.entitlements
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Config/Info.plist
        TWAINBRIDGE_UPDATE_FEED_URL: ""
        TWAINBRIDGE_UPDATE_PUBLIC_KEY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: false
    postBuildScripts:
      - name: Stamp Incrementing Build Version
        script: '"${SRCROOT}/Scripts/stamp-build-version.sh"'
        inputFiles:
          - "$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)"
        basedOnDependencyAnalysis: false
  TwainBridgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: TwainBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.45webs.TwainBridgeTests
        GENERATE_INFOPLIST_FILE: true
schemes:
  TwainBridge:
    build:
      targets:
        TwainBridge: all
        TwainBridgeTests: [test]
    test:
      targets:
        - TwainBridgeTests
